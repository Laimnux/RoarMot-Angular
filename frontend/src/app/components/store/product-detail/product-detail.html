<div class="min-h-screen bg-gray-50 dark:bg-roar-dark text-gray-900 dark:text-white p-4 md:p-12 transition-colors duration-500">
  
  <button (click)="volver()" class="mb-8 flex items-center gap-2 text-gray-500 dark:text-gray-400 hover:text-rose-600 transition-colors font-mono text-xs tracking-widest">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    VOLVER_AL_CATÁLOGO
  </button>

  <div *ngIf="producto" class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">
    
    <div class="relative group">
      <div class="absolute -inset-1 bg-gradient-to-b from-rose-600/20 to-transparent rounded-[2rem] blur opacity-25"></div>
      <div class="relative bg-white dark:bg-black rounded-[2rem] overflow-hidden border border-gray-200 dark:border-white/5 shadow-2xl">
        <img [src]="producto.imagen_url" [alt]="producto.nombre" class="w-full h-[500px] object-cover opacity-90 dark:opacity-80 group-hover:opacity-100 transition-opacity duration-700">
        
        <div class="absolute top-6 left-6 bg-white/90 dark:bg-black/80 backdrop-blur-xl border border-gray-200 dark:border-rose-600/30 px-4 py-2 rounded-lg shadow-sm">
          <span class="font-bebas text-xl tracking-widest text-rose-600">{{ producto.marca }}</span>
        </div>
      </div>
    </div>

    <div class="flex flex-col justify-center">
      <div class="mb-6">
        <span class="text-emerald-600 dark:text-emerald-500 font-mono text-[10px] tracking-[0.5em] uppercase block mb-2">
          PROTOCOLO_SUMINISTRO // SKU: {{ producto.sku }}
        </span>
        <h1 class="font-bebas text-6xl tracking-tighter leading-none mb-4 text-gray-800 dark:text-white uppercase">
          {{ producto.nombre }}
        </h1>
        <div class="h-1 w-20 bg-rose-600"></div>
      </div>

      <p class="text-gray-600 dark:text-gray-400 font-sans leading-relaxed mb-8 text-lg italic">
        "{{ producto.descripcion }}"
      </p>

      <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 p-4 rounded-2xl backdrop-blur-md shadow-sm">
          <span class="text-[10px] text-gray-400 dark:text-gray-500 uppercase block font-bold mb-1 italic">Precio Sugerido</span>
          <span class="text-4xl font-vt323 text-emerald-600 dark:text-emerald-400">
            ${{ producto.precio | number:'1.0-0' }}
          </span>
        </div>
        <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 p-4 rounded-2xl backdrop-blur-md shadow-sm">
          <span class="text-[10px] text-gray-400 dark:text-gray-500 uppercase block font-bold mb-1 italic">Stock Matriz</span>
          <span class="text-4xl font-vt323" [ngClass]="producto.cantidad > 0 ? 'text-gray-800 dark:text-white' : 'text-rose-600'">
            {{ producto.cantidad }}
          </span>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4">
        <button (click)="agregarAlCarrito()" 
                [disabled]="producto.cantidad <= 0"
                class="flex-1 bg-gray-900 dark:bg-white text-white dark:text-black font-bebas text-2xl py-4 rounded-2xl hover:bg-rose-600 dark:hover:bg-rose-600 hover:text-white transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-xl">
          {{ producto.cantidad > 0 ? 'AÑADIR AL EQUIPAMIENTO' : 'SUMINISTRO AGOTADO' }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="flex flex-col items-center justify-center py-40">
    <div class="w-12 h-12 border-4 border-rose-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="font-mono text-[10px] tracking-[0.4em] text-gray-500 dark:text-gray-400">ACCEDIENDO_A_LA_BASE_DE_DATOS...</p>
  </div>
</div>
