<div class="flex h-screen overflow-hidden bg-gray-50 dark:bg-[#0D1118] text-gray-900 dark:text-white font-sans transition-colors duration-500">

  <aside class="w-72 flex-shrink-0 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-[#090C10] flex flex-col h-full z-20">

    <div class="p-8 border-b border-gray-100 dark:border-white/5 relative overflow-hidden group">
      <div class="relative z-10">
        <h2 class="font-bebas text-3xl tracking-tighter text-gray-800 dark:text-white leading-none">
          ROARMOT <span class="text-rose-600">PARTNER</span>
        </h2>
        <div class="flex items-center gap-2 mt-2">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <p class="text-[9px] uppercase font-black tracking-[0.2em] text-gray-500">Terminal_Control v2.1</p>
        </div>
      </div>
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-rose-600/10 blur-[50px] rounded-full"></div>
    </div>

    <nav class="flex-1 p-6 space-y-4 overflow-y-auto custom-scrollbar-thin">
      <label class="text-[11px] uppercase font-black text-gray-400 dark:text-gray-600 tracking-[0.3em] ml-2 block mb-4">
        Módulos de Sistema
      </label>

      <a routerLink="dashboard" routerLinkActive="active-sidebar-item" class="sidebar-item group">
        <div class="item-icon">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M13 9V3h8v6h-8zM3 13V3h8v10H3zm10 8V11h8v10h-8zM3 21v-6h8v6H3z"/></svg>
        </div>
        <div class="flex flex-col">
          <span class="text-[11px] font-black uppercase tracking-widest">Métricas</span>
          <span class="text-[9px] text-gray-500 font-bold tracking-tighter">DATA_LOG_CENTER</span>
        </div>
      </a>

      <a routerLink="inventario" routerLinkActive="active-sidebar-item" class="sidebar-item group">
        <div class="item-icon"><i class="fas fa-boxes-stacked text-sm"></i></div>
        <div class="flex flex-col">
          <span class="text-[11px] font-black uppercase tracking-widest">Inventario</span>
          <span class="text-[9px] text-gray-500 font-bold tracking-tighter">STOCK_MANAGEMENT</span>
        </div>
      </a>

      <a routerLink="nuevo-producto" routerLinkActive="active-sidebar-item" class="sidebar-item group">
        <div class="item-icon-plus"><i class="fas fa-plus text-xs"></i></div>
        <div class="flex flex-col">
          <span class="text-[11px] font-black uppercase tracking-widest text-rose-600 dark:text-rose-500">Cargar Stock</span>
          <span class="text-[9px] text-gray-500 font-bold tracking-tighter">ADD_NEW_ITEM</span>
        </div>
      </a>
    </nav>
    
    <div class="p-4 border-t border-gray-100 dark:border-white/5">
      <div class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-white/5 rounded-3xl border border-gray-200 dark:border-white/10">
        <img [src]="usuario?.urlImagenPerfil || 'assets/default-avatar.png'"
          class="w-12 h-12 rounded-2xl object-cover border-2 border-rose-600 shadow-lg shadow-rose-600/20">
        <div class="overflow-hidden">
          <h3 class="text-gray-900 dark:text-white font-bebas text-xl tracking-wide truncate">{{ usuario?.nombre }}</h3>
          <span class="px-2 py-0.5 bg-rose-600/10 text-rose-500 text-[8px] font-black uppercase rounded-md border border-rose-600/20 block w-fit">
            Proveedor Autorizado
          </span>
        </div>
      </div>
    </div>

    <div class="p-6 pt-0 space-y-3">
      <button routerLink="/dashboard"
        class="flex items-center gap-3 p-3 w-full bg-gray-100 dark:bg-white/5 rounded-2xl text-gray-600 dark:text-gray-400 hover:text-rose-600 transition-all border border-transparent hover:border-rose-600/20">
        <i class="fas fa-chevron-left text-[10px]"></i>
        <span class="text-[10px] uppercase font-black tracking-[0.2em]">Volver a la App</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-[#0D1118]">
    
    <header class="h-20 flex-shrink-0 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-10 bg-white/50 dark:bg-[#0D1118]/80 backdrop-blur-xl z-10">
      <div class="flex items-center gap-3">
        <div class="h-2 w-2 rounded-full bg-rose-600 animate-ping"></div>
        <span class="text-[11px] font-mono font-bold text-gray-500 tracking-widest uppercase">
          SISTEMA_PARTNER: <span class="text-rose-600">ONLINE</span>
        </span>
      </div>

      <button (click)="toggleDarkMode()"
        class="flex items-center gap-3 px-4 py-2 rounded-2xl border border-gray-300 dark:border-white/10 hover:bg-white dark:hover:bg-white/5 transition-all">
        <span class="text-[10px] font-black uppercase tracking-tighter text-gray-500">{{ isDarkMode ? 'Modo Oscuro' : 'Modo Claro' }}</span>
        <div class="w-8 h-4 bg-gray-200 dark:bg-rose-600/20 rounded-full relative">
          <div class="absolute top-1 transition-all duration-300 w-2 h-2 rounded-full bg-gray-500 dark:bg-rose-500"
            [style.left.px]="isDarkMode ? 18 : 6"></div>
        </div>
      </button>
    </header>

    <div class="flex-1 overflow-y-auto custom-scrollbar">
      <div class="p-10 max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>

  </main>
</div>
