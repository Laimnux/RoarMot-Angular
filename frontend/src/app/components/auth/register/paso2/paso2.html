<div class="text-center mb-10">
    <div class="flex items-center justify-center space-x-2 mb-4">
        <img src="assets/image/shared/LogoBlanco.png" alt="Logo" class="h-12 w-auto brightness-200">
        <h1 class="text-5xl font-bebas text-white tracking-tighter">ROARMOT</h1>
    </div>
    <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold">Registro Paso 2: Verificación</p>
</div>

<div class="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/10 shadow-2xl">
    <h1 class="font-bebas text-4xl text-white text-center mb-2 tracking-wide">VALIDA TU CÓDIGO</h1>
    <p class="text-gray-400 text-center text-sm mb-8">
        Hemos enviado un código de 6 dígitos a tu Gmail.
    </p>

    <div class="flex justify-center space-x-2 mb-8">
        <input *ngFor="let d of digitos; let i = index" 
                type="text" 
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1" 
                [(ngModel)]="digitos[i]"
                (keydown)="onKeyDown($event, i)"
                (keydown)="onKeyDown($event, i)"
                class="w-11 h-14 text-2xl text-center bg-black/40 border-2 border-gray-800 rounded-xl text-white font-bold focus:border-red-600 focus:outline-none transition-all">
    </div>

    <button (click)="verificarCodigo()" [disabled]="digitos.join('').length < 6"
        class="w-full py-4 bg-red-600 text-white font-bebas text-2xl rounded-xl hover:bg-red-700 transition-all shadow-lg disabled:opacity-50 active:scale-95">
        VERIFICAR CÓDIGO
    </button>

    <div class="text-center mt-6">
        <p class="text-gray-500 text-xs">
            ¿No recibiste el código?
            <button (click)="reenviar()" [disabled]="tiempo > 0" [class.text-red-500]="tiempo === 0"
                class="font-bold hover:underline disabled:opacity-50">
                Reenviar código
            </button>
        </p>
        <p *ngIf="tiempo > 0" class="text-gray-600 text-[10px] mt-2 uppercase tracking-widest">
            Podrás reenviar en <span class="text-white">{{tiempo}}</span> segundos
        </p>
    </div>
</div>
