<div class="min-h-screen flex bg-[#0c0e12] relative overflow-hidden">
  
  <div class="hidden lg:block w-1/2 h-screen relative overflow-hidden border-r border-gray-700 p-4">
    <img src="assets/image/auth/moto.webp" alt="Moto RoarMot" 
         class="h-full w-full object-cover duration-700 rounded-2xl">
    <div class="bg-gradient-to-r from-transparent to-[#0c0e1271]"></div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 z-10">
    <div class="max-w-md w-full">
      
      <div class="text-center mb-10">
        <div class="flex items-center justify-center space-x-2 mb-4">
          <img src="assets/image/shared/LogoBlanco.png" alt="Logo" class="h-12 w-auto brightness-200">
          <h1 class="text-5xl font-bebas text-white tracking-tighter shader-text">ROARMOT</h1>
        </div>
        <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold">Inicia sesión en el sistema</p>
      </div>

      <div class="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/10 shadow-2xl">
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          
          <div class="relative group">
            <input type="email" formControlName="email" id="email"
                   class="peer w-full bg-black/40 border border-gray-800 rounded-xl pt-6 pb-2 px-4 text-white text-sm focus:outline-none focus:border-red-600 transition-all duration-300 placeholder-transparent"
                   placeholder="Correo">
            <label for="email" 
                   class="absolute left-4 top-2 text-[10px] uppercase font-bold tracking-widest text-gray-500 transition-all 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-focus:top-2 peer-focus:text-[10px] peer-focus:text-red-500">
              Correo Electrónico
            </label>
            <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" 
                 class="text-red-500 text-[10px] mt-1 font-bold uppercase tracking-tighter animate-pulse">
              Formato de correo no válido
            </div>
          </div>

          <div class="relative group">
            <input type="password" formControlName="password" id="password"
                   class="peer w-full bg-black/40 border border-gray-800 rounded-xl pt-6 pb-2 px-4 text-white text-sm focus:outline-none focus:border-red-600 transition-all duration-300 placeholder-transparent"
                   placeholder="Pass">
            <label for="password" 
                   class="absolute left-4 top-2 text-[10px] uppercase font-bold tracking-widest text-gray-500 transition-all 
                          peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-focus:top-2 peer-focus:text-[10px] peer-focus:text-red-500">
              Contraseña
            </label>
            <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" 
                 class="text-red-500 text-[10px] mt-1 font-bold uppercase tracking-tighter">
              Mínimo 8 caracteres
            </div>
          </div>

          <button type="submit" [disabled]="loginForm.invalid"
                  class="w-full py-4 rounded-xl font-bebas text-2xl tracking-widest transition-all duration-500
                         disabled:bg-gray-800 disabled:opacity-30 disabled:cursor-not-allowed
                         enabled:bg-red-600 enabled:text-white enabled:hover:bg-red-700 enabled:shadow-lg enabled:shadow-red-600/20">
            INGRESAR
          </button>
        </form>

        <div class="relative flex items-center py-8">
          <div class="flex-grow border-t border-white/5"></div>
          <span class="flex-shrink mx-4 font-bebas text-gray-600 text-xl">O</span>
          <div class="flex-grow border-t border-white/5"></div>
        </div>

        <div class="text-center">
          <p class="font-bebas text-xl text-gray-500">¿No tienes cuenta?</p>
          <a routerLink="/registro" class="inline-block font-bebas text-2xl text-red-600 hover:text-white transition-colors duration-300 mt-1">
            CREAR CUENTA
          </a>
        </div>
      </div>

      <div class="mt-12 text-center">
        <p class="italic font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-yellow-500 text-lg uppercase tracking-widest">
          "MOTERO AYUDA MOTERO"
        </p>
      </div>

    </div>
  </div>
</div>
