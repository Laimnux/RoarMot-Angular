<div id="moto-manager" class="w-full h-full p-0">
  
  <div *ngIf="!motoSeleccionada" id="moto-manager__registro" 
       class="grid-bento-internal w-full h-full">

    <div class="image-box relative overflow-hidden bg-gray-950 flex items-center justify-center">
      <input type="file" (change)="onFileSelected($event)" accept="image/*" 
             class="absolute inset-0 opacity-0 cursor-pointer z-20 w-full h-full" />
      
      <div *ngIf="!imagePreview" class="flex flex-col justify-center items-center p-4 z-10 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 mb-2 text-roar-red">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.58-1.58L10.5 11.25H21a2.25 2.25 0 00-2.25-2.25H15a2.25 2.25 0 00-2.25 2.25v2.25m-1.5-3.52l2.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6.75A2.25 2.25 0 016 4.5h2.25" />
        </svg>
        <p class="text-[10px] font-bold uppercase tracking-widest text-white">Subir foto de tu moto</p>
        <p class="text-[8px] text-gray-400 uppercase mt-1">Click o arrastra</p>
      </div>

      <img *ngIf="imagePreview" [src]="imagePreview" class="w-full h-full object-cover">
    </div>

    <div class="form-box bg-white dark:bg-roar-card p-6 flex flex-col justify-between">
      <form [formGroup]="motoForm" (ngSubmit)="guardarMoto()" class="h-full flex flex-col justify-between" autocomplete="off">
        
        <div class="space-y-4">
          <h3 class="font-oswald text-xs tracking-[0.2em] border-b border-gray-700 dark:border-white/10 pb-2 text-gray-900 dark:text-white uppercase">
            Datos básicos
          </h3>
          <div class="grid grid-cols-1 gap-3">
            <input type="text" formControlName="placa_moto" placeholder="Placa (ABC-123)" class="input-minimalist uppercase">
            <input type="text" formControlName="marca_moto" placeholder="Marca" class="input-minimalist">
            <input type="text" formControlName="modelo_moto" placeholder="Modelo" class="input-minimalist">
          </div>

          <h3 class="font-oswald text-xs tracking-[0.2em] border-b border-gray-700 dark:border-white/10 pb-2 text-gray-900 dark:text-white uppercase mt-4">
            Técnicos
          </h3>
          <div class="grid grid-cols-1 gap-3">
            <input type="number" formControlName="kilometraje" placeholder="Kilometraje actual" class="input-minimalist">
            <div class="flex gap-4">
              <div class="flex-1">
                <label class="text-[8px] uppercase text-gray-500 font-bold mb-1 block">Vence SOAT</label>
                <input type="date" formControlName="soat_moto" class="input-minimalist text-[11px]">
              </div>
              <div class="flex-1">
                <label class="text-[8px] uppercase text-gray-500 font-bold mb-1 block">Vence TECNO</label>
                <input type="date" formControlName="tecnomecanica" class="input-minimalist text-[11px]">
              </div>
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="motoForm.invalid" class="registrar-btn-modern mt-6">
          <span class="font-oswald text-xs tracking-widest font-bold">REGISTRAR MOTO</span>
        </button>
      </form>
    </div>

  </div>
</div>
