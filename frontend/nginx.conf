server {
    listen 80;
    server_name localhost;

    # --- LÍMITE DE SUBIDA (50MB para soportar galerías de fotos) ---
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # --- BLOQUE CRÍTICO PARA ANGULAR (Single Page Application) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- PROXY PARA EL BACKEND (Django/Gunicorn) ---
    location /api/ {
        proxy_pass http://backend:8000;
        
        # Encabezados de red para que Django sepa de dónde viene la petición
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tiempos de espera extendidos para subidas de archivos grandes
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # --- MANEJO DE ARCHIVOS ESTÁTICOS/MEDIA (Fotos de productos/perfil) ---
    location /media/ {
        # Esta ruta debe coincidir con el volumen definido en docker-compose
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public";
        
        # Opcional: permite ver las fotos aunque sean pesadas
        client_max_body_size 50M;
    }

    # --- MANEJO DE ERRORES DE SERVIDOR ---
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}