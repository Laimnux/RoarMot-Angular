<header class="bg-[#0D1118] text-white sticky top-0 z-50 shadow-xl">
    <div class="max-w-[100%] px-6 py-2 flex items-center justify-between">

        <div class="flex items-center">
            <a routerLink="/"
                class="block aspect-square max-w-[70px] sm:max-w-[50px] w-auto object-contain transition-transform duration-300 hover:scale-105">
                <img src="assets/image/shared/LogoBlanco.png" alt="Logo RoarMot" class="w-full h-auto">
            </a>
            <a routerLink="/" class="hidden md:block transition-transform duration-300 hover:scale-105 ml-1 md:ml-2">
                <img src="assets/image/shared/tipografiaLogo.png" alt="Tipografía RoarMot"
                    class="w-auto h-auto md:h-[35px] lg:h-[30px] max-w-[180px] object-contain">
            </a>
        </div>

        <nav class="hidden md:flex flex-grow justify-center items-center space-x-10">
            <a href="#tienda" class="nav-link">Tienda</a>

            <a href="#cda" class="nav-link">CDA</a>

            <a href="#alerta" class="nav-link">Alertas</a>

            <a href="#sos" class="nav-link-sos">SOS</a>
        </nav>

        <div class="flex items-center flex-shrink-0 space-x-4">
            <a [routerLink]="['/login']" class="hidden md:block nav-link-login">
                Iniciar sesión
            </a>
            <a [routerLink]="['/registro/paso1']"
                class="bg-red-600 hover:bg-[#fd8c00] text-white px-4 py-2 rounded-full font-bold tracking-wide transition-all duration-150 transform hover:scale-110 shadow-lg">
                REGÍSTRATE
            </a>
        </div>

        <button (click)="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>

    </div>
</header>
