<header
  class="w-full transition-colors duration-500 bg-white dark:bg-[#0D1118]/95 backdrop-blur-md sticky top-0 z-50 shadow-sm dark:shadow-none">
  <nav class="w-full flex items-center justify-between px-4 sm:px-6 py-3">

    <div class="flex items-center gap-3 cursor-pointer group" routerLink="/app/dashboard">
      <div class="relative">
        <img src="assets/image/shared/LogoBlanco.png" alt="Logo Roarmot"
          class="h-10 w-auto transition-transform group-hover:rotate-12 dark:invert-0 invert">
        <div
          class="absolute inset-0 bg-red-600/10 blur-xl rounded-full -z-10 opacity-0 group-hover:opacity-100 transition-opacity">
        </div>
      </div>
      <h1
        class="text-3xl font-bebas text-gray-900 dark:text-white tracking-tighter shader-text uppercase transition-colors">
        ROARMOT
      </h1>
    </div>

    <div
      class="hidden md:flex items-center p-1 gap-1 transition-all bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-2xl">

      <a routerLink="/app/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}"
        class="nav-item relative flex flex-row items-center gap-2 px-4 py-2 rounded-xl text-black dark:text-gray-400 hover:text-rose-600 dark:hover:text-white transition-all duration-300 font-bold group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24">
          <path d="M13 9V3h8v6h-8zM3 13V3h8v10H3zm10 8V11h8v10h-8zM3 21v-6h8v6H3z" />
        </svg>
        <span class="text-[12px] uppercase tracking-tighter">Panel</span>
        <div
          class="indicator absolute -bottom-1 left-2 right-2 h-0.5 bg-rose-600 scale-x-0 transition-transform duration-300">
        </div>
      </a>

      <a routerLink="/app/store" routerLinkActive="active-link"
        class="nav-item relative flex flex-row items-center gap-2 px-4 py-2 rounded-xl text-black dark:text-gray-400 hover:text-rose-600 dark:hover:text-white transition-all duration-300 font-bold group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor"
          viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 11-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span class="text-[12px] uppercase tracking-tighter">Store</span>
        <div
          class="indicator absolute -bottom-1 left-2 right-2 h-0.5 bg-rose-600 scale-x-0 transition-transform duration-300">
        </div>
      </a>

      <a routerLink="/app/mantenimientos" routerLinkActive="active-link"
        class="nav-item relative flex flex-row items-center gap-2 px-4 py-2 rounded-xl text-gray-500 dark:text-gray-400 hover:text-rose-600 dark:hover:text-white transition-all duration-300 font-bold group">
        <svg class="h-5 w-5 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 2C7.03 2 3 6.03 3 11v5l-1.29 1.29c-.63.63-.19 1.71.7 1.71h19.18c.89 0 1.33-1.08.7-1.71L21 16v-5c0-4.97-4.03-9-9-9zm0 18c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2z" />
        </svg>
        <span class="text-[12px] uppercase tracking-tighter">Mantenimientos</span>
        <div class="absolute top-1 left-2">
          <span class="absolute w-2 h-2 bg-rose-600 rounded-full animate-ping"></span>
          <span
            class="relative inline-flex w-2 h-2 bg-rose-600 rounded-full border border-white dark:border-[#0a0a0b]"></span>
        </div>
        <div
          class="indicator absolute -bottom-1 left-2 right-2 h-0.5 bg-rose-600 scale-x-0 transition-transform duration-300">
        </div>
      </a>

      <div class="w-px h-6 bg-gray-300 dark:bg-white/10 mx-1"></div>

      <a routerLink="/app/sos" routerLinkActive="active-sos"
        class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white dark:bg-red-600/10 dark:text-red-500 rounded-xl transition-all font-black italic group shadow-md hover:scale-105">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
        </svg>
        SOS
      </a>
    </div>

    <div class="flex items-center gap-4">

      <a *ngIf="mostrarBotonStore" routerLink="/app/store" routerLinkActive="active-link"
        class="hidden lg:block sparkle-button bg-yellow-400 text-black px-5 py-2 rounded-xl font-black text-sm hover:scale-105 transition-transform uppercase tracking-wider shadow-lg shadow-yellow-500/20">
        Store Accessories
      </a>

      <div class="relative group" *ngIf="usuario">
        <button
          class="flex items-center gap-2 p-1 pr-3 transition-colors bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-2xl">
          <div class="w-10 h-10 rounded-xl overflow-hidden bg-gray-200 dark:bg-gray-800">
            <img [src]="usuario.url_imagen_perfil || 'assets/uploads/avatar2.png'" [alt]="usuario.nombre"
              class="w-full h-full object-cover">
          </div>
          <svg class="w-4 h-4 text-black dark:text-gray-400 group-hover:rotate-180 transition-transform" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <div
          class="absolute right-0 mt-3 w-72 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all translate-y-2 group-hover:translate-y-0 z-50 overflow-hidden bg-white dark:bg-[#0D1118] border border-gray-200 dark:border-gray-700">

          <div class="p-5 border-b border-gray-50 dark:border-white/5">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-14 h-14 rounded-2xl overflow-hidden shadow-inner">
                <img [src]="usuario.url_imagen_perfil || 'assets/uploads/avatar2.png'"
                  class="w-full h-full object-cover">
              </div>
              <div>
                <h3 class="text-gray-700 dark:text-gray-300 font-black uppercase text-sm truncate w-40">
                  {{ usuario.nombre }}
                </h3>
                <span class="text-[10px] px-2 py-0.5 rounded-full font-black tracking-tighter"
                  [ngClass]="usuario.rol_id === 1 ? 'bg-violet-900 text-white' : 'bg-emerald-800 text-gray-300'">
                  {{ usuario.rol_id === 1 ? 'Proveedor Autorizado' : 'Usuario Habitual' }}
                </span>
              </div>
            </div>
            <p class="text-xs text-gray-700/70 dark:text-gray-400 font-bold truncate">
              {{ formatearEmail(usuario.email) }}
            </p>
          </div>

          <div class="p-2 grid grid-cols-1 gap-1">
            <a routerLink="/app/perfil"
              class="dropdown-link flex items-center gap-2 w-full p-2 text-gray-700 dark:text-gray-200 font-bold hover:bg-gray-100 dark:hover:bg-white/5 rounded-xl transition-all">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2" />
              </svg>
              Mi Perfil
            </a>

            <button *ngIf="usuario.rol_id === 1" routerLink="/vendedor/dashboard"
              class="dropdown-link flex items-center gap-2 w-full p-2 text-violet-600 dark:text-violet-400 font-black hover:bg-violet-50 dark:hover:bg-violet-500/10 rounded-xl transition-all border border-transparent hover:border-violet-500/20">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
              </svg>
              Panel Inventario
            </button>

            <div class="h-px bg-gray-200 dark:bg-gray-700 my-1"></div>

            <div class="px-4 py-3 flex items-center justify-between">
              <span class="text-xs text-gray-700 dark:text-gray-300 font-black uppercase">Modo Nocturno</span>
              <button (click)="toggleDarkMode()"
                class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none border border-gray-400 dark:border-transparent"
                [class.bg-red-600]="isDarkMode" [class.bg-gray-200]="!isDarkMode">
                <span [class.translate-x-6]="isDarkMode" [class.translate-x-1]="!isDarkMode"
                  class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform shadow-md">
                </span>
              </button>
            </div>

            <button (click)="logout()"
              class="dropdown-link flex items-center gap-2 w-full p-2 text-red-500 font-black hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-all">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Cerrar Sesión
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div
    class="h-[1px] w-full animate-pulse bg-gradient-to-r from-transparent via-red-600 to-transparent shadow-[0_0_15px_rgba(220,38,38,0.5)]">
  </div>
</header>
