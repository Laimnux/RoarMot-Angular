<div class="animate-fadeIn pb-10">
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
    <div>
      <div class="flex items-center gap-3 mb-2">
        <span class="w-2 h-2 rounded-full bg-rose-600 animate-pulse"></span>
        <h4 class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-500 dark:text-gray-400">
          Terminal de Suministros
        </h4>
      </div>
      <h2 class="font-bebas text-5xl text-gray-800 dark:text-white tracking-tighter uppercase leading-none">
        Registro de <span class="text-rose-600">Stock</span>
      </h2>
      <p class="text-xs text-gray-500 dark:text-gray-400 font-medium mt-2 italic">
        // Ingreso de nueva referencia al inventario global
      </p>
    </div>

    <div class="flex items-center gap-2 px-4 py-2 bg-gray-200/50 dark:bg-white/5 backdrop-blur-md rounded-2xl border border-gray-300/50 dark:border-white/10">
      <span class="text-[10px] font-mono text-gray-600 dark:text-gray-400 uppercase tracking-widest">
        Sys_ID: #NEW_ITEM
      </span>
    </div>
  </div>

  <form [formGroup]="productoForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <div class="lg:col-span-1 space-y-6">
      <div class="bg-white dark:bg-black/40 backdrop-blur-xl p-8 rounded-[2.5rem] border border-gray-200 dark:border-white/5 shadow-xl flex flex-col items-center justify-center min-h-[400px] group transition-all hover:border-rose-600/30">
        
        <div class="relative w-full aspect-square rounded-[2rem] overflow-hidden border-2 border-dashed border-gray-300 dark:border-white/10 flex items-center justify-center bg-gray-50 dark:bg-white/5 transition-colors group-hover:bg-rose-600/5">
          <ng-container *ngIf="!imagePreview">
            <div class="text-center p-6">
              <div class="w-16 h-16 bg-gray-200 dark:bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                <i class="fas fa-camera text-2xl text-gray-400"></i>
              </div>
              <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Subir fotografía</p>
              <input type="file" (change)="onFileSelected($event)" accept="image/*"
                class="absolute inset-0 opacity-0 cursor-pointer">
            </div>
          </ng-container>
          <img *ngIf="imagePreview" [src]="imagePreview" class="w-full h-full object-cover animate-fadeIn">
        </div>

        <div class="mt-6 w-full">
          <label class="text-[10px] uppercase font-bold tracking-[0.2em] text-gray-500 mb-2 block">Descripción Técnica</label>
          <textarea formControlName="descripcion"
            class="w-full bg-gray-100 dark:bg-black/20 border border-gray-300 dark:border-white/10 rounded-2xl p-4 text-xs focus:ring-2 focus:ring-rose-600 outline-none min-h-[120px] transition-all"
            placeholder="Detalles de materiales, certificaciones, etc..."></textarea>
        </div>
      </div>
    </div>

    <div class="lg:col-span-2">
      <div class="bg-white dark:bg-[#0D1118]/60 backdrop-blur-xl p-8 rounded-[2.5rem] border border-gray-200 dark:border-white/5 shadow-xl h-full">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-rose-600 ml-2">Nombre del Producto</label>
            <input type="text" formControlName="nombre" placeholder="Ej: Casco Carbon"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-rose-600 outline-none transition-all">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2">Marca</label>
            <input type="text" formControlName="marca" placeholder="Ej: AGV"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-rose-600 outline-none transition-all">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2">SKU / Referencia</label>
            <input type="text" formControlName="sku" placeholder="REF-000"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-rose-600 outline-none transition-all font-mono">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2">Talla / Medida</label>
            <select formControlName="talla"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-rose-600 outline-none transition-all appearance-none cursor-pointer">
              <option value="XS">XS (Extra Small)</option>
              <option value="S">S (Small)</option>
              <option value="M">M (Medium)</option>
              <option value="L">L (Large)</option>
              <option value="XL">XL (Extra Large)</option>
              <option value="XXL">XXL (Double Extra Large)</option>
              <option value="NA">No Aplica / Accesorios</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2">Categoría de Producto</label>
            <select formControlName="id_subcategoria"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-rose-600 outline-none transition-all appearance-none cursor-pointer">
              <option value="" disabled>Seleccionar...</option>
              <option value="1">Cascos</option>
              <option value="2">Guantes</option>
              <option value="3">Chaquetas</option>
              <option value="4">Accesorios</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-emerald-500 ml-2">Precio Unitario ($)</label>
            <input type="number" formControlName="precio"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-emerald-500 outline-none transition-all text-emerald-600 font-bold">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] uppercase font-black tracking-widest text-blue-500 ml-2">Stock Inicial (Cantidad)</label>
            <input type="number" formControlName="cantidad" placeholder="Ej: 20"
              class="w-full bg-gray-100 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-3 text-sm focus:border-blue-500 outline-none transition-all font-bold">
          </div>

          <div class="mt-4 p-6 bg-yellow-500/10 border-l-4 border-yellow-500 rounded-2xl">
            <div class="flex items-center gap-3 mb-2">
              <i class="fas fa-exclamation-triangle text-yellow-500 text-xs"></i>
              <label class="text-[10px] uppercase font-black tracking-widest text-yellow-600">Alerta de Stock Mínimo</label>
            </div>
            <input type="number" formControlName="stock_minimo"
              class="w-32 bg-white/10 border border-yellow-500/20 rounded-lg px-3 py-2 text-xs outline-none focus:border-yellow-500 transition-all font-bold"
              placeholder="5">
            <p class="text-[9px] text-gray-500 mt-2 italic font-medium">El sistema te notificará cuando el stock sea menor a este número.</p>
          </div>
        </div>

        <div class="mt-10">
          <button type="submit" [disabled]="productoForm.invalid"
            class="w-full py-4 bg-rose-600 hover:bg-rose-700 disabled:bg-gray-400 disabled:scale-100 text-white font-bebas text-2xl tracking-[0.2em] rounded-2xl shadow-[0_10px_30px_rgba(225,29,72,0.3)] transition-all active:scale-[0.98] flex items-center justify-center gap-4 group">
            <i class="fas fa-sync-alt group-hover:rotate-180 transition-transform duration-500"></i>
            Sincronizar Producto
          </button>
        </div>

      </div>
    </div>
  </form>
</div>
