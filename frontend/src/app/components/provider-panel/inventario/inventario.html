<div class="space-y-8 animate-fade-in">

  <div
    class="flex flex-col md:flex-row justify-between items-end gap-6 border-b border-gray-200 dark:border-white/5 pb-8">
    <div>
      <h2 class="text-4xl font-bebas tracking-tighter text-gray-900 dark:text-white leading-none">
        CONTROL <span class="text-rose-600">INVENTARIO</span>
      </h2>
      <p class="text-[10px] uppercase font-black tracking-[0.3em] text-gray-500 mt-2">Data_Source: Live_Stock_V2</p>
    </div>

    <div class="relative w-full md:w-96 group">
      <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
        <i class="fas fa-search text-gray-500 text-xs group-focus-within:text-rose-600 transition-colors"></i>
      </div>
      <input type="text" (input)="onSearch($event)" placeholder="FILTRAR POR NOMBRE O SKU..."
        class="w-full bg-white dark:bg-[#090C10] border border-gray-200 dark:border-white/10 rounded-2xl py-3 pl-12 pr-4 text-[11px] font-black uppercase tracking-widest focus:outline-none focus:border-rose-600/50 focus:ring-4 focus:ring-rose-600/5 transition-all placeholder:text-gray-600">
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let prod of productosFiltrados"
      class="card-roarmot group relative bg-white dark:bg-[#090C10] rounded-[2.5rem] p-6 border border-gray-100 dark:border-white/5 transition-all duration-500 shadow-xl hover:shadow-rose-600/5">

      <div
        class="relative h-60 w-full mb-6 overflow-hidden rounded-[2rem] bg-gray-100 dark:bg-[#0D1118] border border-transparent group-hover:border-rose-600/20 transition-colors">

        <img [src]="prod.imagen || 'assets/img/no-product.png'"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 grayscale-[20%] group-hover:grayscale-0">

        <div class="absolute top-4 left-4">
          <button (click)="fileInput.click()" type="button"
            class="bg-black/60 hover:bg-rose-600 text-white p-2.5 rounded-xl backdrop-blur-md border border-white/10 transition-all shadow-lg group/img-edit">
            <i class="fas fa-camera text-xs"></i>
            <span
              class="max-w-0 overflow-hidden group-hover/img-edit:max-w-xs transition-all duration-300 text-[12px] font-black uppercase tracking-tighter ml-0 group-hover/img-edit:ml-2">
              Cambiar
            </span>
          </button>

          <input #fileInput type="file" (change)="onImageChange($event, prod)" accept="image/*" style="display: none;">
        </div>

        <div class="absolute top-4 right-4 flex flex-col items-end gap-2">

          <div
            class="group/edit-sku cursor-pointer bg-black/80 text-white text-[11px] px-3 py-1.5 rounded-xl backdrop-blur-xl border border-white/10 font-black tracking-widest flex items-center gap-2">
            <span *ngIf="editingId !== prod.id || editingField !== 'sku'">SKU_{{prod.sku}}</span>
            <input *ngIf="editingId === prod.id && editingField === 'sku'" [(ngModel)]="tempValue"
              (keyup.enter)="actualizarCampo(prod, 'sku', tempValue)" (keyup.esc)="cancelarEdicion()"
              (blur)="cancelarEdicion()"
              class="bg-transparent border-b border-rose-600 outline-none w-16 text-white text-center text-[11px] font-black">
            <i (click)="comenzarEdicion(prod, 'sku')"
              class="fas fa-pen text-[10px] text-rose-500 opacity-0 group-hover/edit-sku:opacity-100 transition-opacity"></i>
          </div>

          <div
            class="group/edit-brand cursor-pointer bg-rose-600/90 text-white text-[11px] px-2 py-1 rounded-lg font-black uppercase tracking-widest flex items-center gap-2">
            <span *ngIf="editingId !== prod.id || editingField !== 'marca'">{{prod.marca}}</span>
            <input *ngIf="editingId === prod.id && editingField === 'marca'" [(ngModel)]="tempValue"
              (keyup.enter)="actualizarCampo(prod, 'marca', tempValue)" (keyup.esc)="cancelarEdicion()"
              (blur)="cancelarEdicion()"
              class="bg-transparent border-none outline-none w-16 text-white text-center text-[11px] font-black uppercase">
            <i (click)="comenzarEdicion(prod, 'marca')"
              class="fas fa-pen text-[10px] text-white opacity-50 group-hover/edit-brand:opacity-100 transition-opacity"></i>
          </div>

          <div
            class="group/edit-talla cursor-pointer bg-gray-800 dark:bg-white/10 text-white dark:text-gray-300 text-[10px] font-black px-2 py-1 rounded-md flex items-center gap-1 uppercase border border-white/5">
            <span *ngIf="editingId !== prod.id || editingField !== 'talla'">Talla: {{prod.talla || 'NA'}}</span>
            <select *ngIf="editingId === prod.id && editingField === 'talla'" [(ngModel)]="tempValue"
              (change)="actualizarCampo(prod, 'talla', tempValue)" (blur)="cancelarEdicion()"
              class="bg-rose-600 text-white border-none outline-none rounded text-[9px] font-black px-1">
              <option value="XS">XS</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
              <option value="NA">NA</option>
            </select>
            <i (click)="comenzarEdicion(prod, 'talla')"
              class="fas fa-tag text-[8px] opacity-60 hover:opacity-100 transition-opacity"></i>
          </div>

        </div>
      </div>

      <div class="space-y-4">
        <div class="flex justify-between items-start">
          <div class="flex-1 group/edit-name cursor-pointer">
            <h3 *ngIf="editingId !== prod.id || editingField !== 'nombre'"
              class="text-2xl font-bebas tracking-wide text-gray-900 dark:text-white uppercase inline-block">
              {{prod.nombre}}
            </h3>
            <input *ngIf="editingId === prod.id && editingField === 'nombre'" [(ngModel)]="tempValue"
              (keyup.enter)="actualizarCampo(prod, 'nombre', tempValue)" (keyup.esc)="cancelarEdicion()"
              (blur)="cancelarEdicion()"
              class="bg-transparent border-b border-rose-600 text-2xl font-bebas outline-none text-rose-600 w-full uppercase">
            <i (click)="comenzarEdicion(prod, 'nombre')"
              class="fas fa-pen ml-2 text-[12px] text-rose-600 opacity-0 group-hover/edit-name:opacity-100 transition-all"></i>
          </div>

          <button (click)="borrarProducto(prod.id, prod.nombre)"
            class="text-gray-400 hover:text-rose-600 transition-colors ml-4 p-1">
            <i class="fas fa-trash-alt text-xs"></i>
          </button>
        </div>

        <div
          class="group/edit-desc cursor-pointer border-l-2 border-transparent hover:border-rose-600/30 pl-2 transition-all">
          <p *ngIf="editingId !== prod.id || editingField !== 'descripcion'"
            class="text-[14px] text-gray-500 dark:text-gray-400 line-clamp-2 italic leading-relaxed">
            {{prod.descripcion || 'Sin descripción...'}}
            <i (click)="comenzarEdicion(prod, 'descripcion')"
              class="fas fa-pen ml-1 text-[12px] text-rose-600 opacity-0 group-hover/edit-desc:opacity-100"></i>
          </p>
          <textarea *ngIf="editingId === prod.id && editingField === 'descripcion'" [(ngModel)]="tempValue"
            (keyup.enter)="actualizarCampo(prod, 'descripcion', tempValue)" (keyup.esc)="cancelarEdicion()"
            (blur)="cancelarEdicion()"
            class="bg-transparent border border-rose-600/30 rounded-lg p-2 text-[14px] text-rose-600 outline-none w-full h-16 italic resize-none"></textarea>
        </div>

        <div class="flex justify-between items-end border-t border-gray-100 dark:border-white/5 pt-5 mt-2">
          <div class="group/edit-price cursor-pointer">
            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-1 flex items-center gap-2">
              VALOR_MARKET <i (click)="comenzarEdicion(prod, 'precio')"
                class="fas fa-pen text-[12px] text-rose-600 opacity-0 group-hover/edit-price:opacity-100 transition-opacity"></i>
            </p>
            <span *ngIf="editingId !== prod.id || editingField !== 'precio'"
              class="text-3xl font-bebas text-rose-600 tracking-wider">
              ${{prod.precio | number}}
            </span>
            <input *ngIf="editingId === prod.id && editingField === 'precio'" type="number" [(ngModel)]="tempValue"
              (keyup.enter)="actualizarCampo(prod, 'precio', tempValue)" (keyup.esc)="cancelarEdicion()"
              (blur)="cancelarEdicion()"
              class="bg-transparent border-b border-rose-600 text-3xl font-bebas outline-none text-rose-600 w-28 tracking-wider">
          </div>

          <div class="text-right space-y-1">
            <div class="group/edit-min cursor-pointer flex items-center justify-end gap-2">
              <i (click)="comenzarEdicion(prod, 'stock_minimo')"
                class="fas fa-pen text-[12px] text-rose-600 opacity-0 group-hover/edit-min:opacity-100"></i>
              <p *ngIf="editingId !== prod.id || editingField !== 'stock_minimo'"
                class="text-[11px] font-black text-gray-500 uppercase tracking-widest">
                MIN_REQUERIDO: {{prod.stock_minimo}}
              </p>
              <input *ngIf="editingId === prod.id && editingField === 'stock_minimo'" type="number"
                [(ngModel)]="tempValue" (keyup.enter)="actualizarCampo(prod, 'stock_minimo', tempValue)"
                (keyup.esc)="cancelarEdicion()" (blur)="cancelarEdicion()"
                class="bg-transparent border-b border-rose-600 text-[11px] font-black text-rose-600 outline-none w-10 text-right">
            </div>

            <div class="group/edit-stock cursor-pointer flex items-center justify-end gap-3">
              <i (click)="comenzarEdicion(prod, 'cantidad')"
                class="fas fa-pen text-[12px] text-rose-600 opacity-0 group-hover/edit-stock:opacity-100 transition-opacity"></i>
              <div class="text-right">
                <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest leading-none mb-1">STOCK_LEVEL
                </p>
                <span *ngIf="editingId !== prod.id || editingField !== 'cantidad'"
                  [class]="prod.cantidad < prod.stock_minimo ? 'text-rose-500 animate-pulse' : 'text-emerald-500'"
                  class="text-2xl font-bebas tracking-widest">
                  {{prod.cantidad}} <span class="text-[10px]">UNITS</span>
                </span>
                <input *ngIf="editingId === prod.id && editingField === 'cantidad'" type="number"
                  [(ngModel)]="tempValue" (keyup.enter)="actualizarCampo(prod, 'cantidad', tempValue)"
                  (keyup.esc)="cancelarEdicion()" (blur)="cancelarEdicion()"
                  class="bg-transparent border-b border-rose-600 text-2xl font-bebas outline-none text-rose-600 w-16 text-right tracking-widest">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
