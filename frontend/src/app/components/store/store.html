<div class="min-h-screen bg-gray-50 dark:bg-roar-dark text-gray-900 dark:text-white p-4 md:p-8 font-sans transition-colors duration-500 overflow-x-hidden">

  <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-end gap-6 border-b border-gray-200 dark:border-white/5 pb-6">
    <div class="relative">
      <div class="flex items-center gap-3 mb-2">
        <span class="w-2 h-2 rounded-full bg-rose-600 animate-pulse shadow-[0_0_8px_rgba(225,29,72,0.8)]"></span>
        <h1 class="font-bebas text-5xl tracking-[0.2em] text-gray-800 dark:text-white uppercase leading-none">
          ROARMOT <span class="text-rose-600">STORE</span>
        </h1>
      </div>
      <p class="text-[10px] uppercase tracking-[0.4em] text-gray-500 font-mono italic">
        CATÁLOGO_SUMINISTROS // <span class="text-emerald-500 font-bold">PROTOCOLO_VENTA_ACTIVO</span>
      </p>
    </div>

    <div class="relative w-full md:w-96 group">
      <div class="absolute -inset-0.5 bg-gradient-to-r from-rose-600 to-transparent rounded-xl opacity-20 group-hover:opacity-40 transition duration-500"></div>
      <input 
        (input)="onSearch($event)"
        type="text" 
        placeholder="BUSCAR_SKU_O_PRODUCTO..." 
        class="relative w-full bg-white dark:bg-black/40 border border-gray-300 dark:border-white/10 rounded-xl px-5 py-4 text-[11px] font-mono text-gray-800 dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-600 focus:outline-none focus:border-rose-600/50 transition-all backdrop-blur-md"
      >
      <div class="absolute right-4 top-4 text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    
    <div *ngFor="let producto of listProductos" 
      class="group bg-white dark:bg-roar-card border border-gray-200 dark:border-white/5 rounded-[2rem] overflow-hidden hover:border-rose-600/40 transition-all duration-500 shadow-xl dark:shadow-none flex flex-col relative">
      
      <div class="absolute top-4 left-4 right-4 z-10 flex justify-between items-start">
        <span class="bg-black/60 backdrop-blur-md text-white text-[9px] font-black px-2 py-1 rounded border border-white/10 uppercase tracking-widest">
          {{ producto.marca }}
        </span>
        <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
      </div>

      <div class="relative h-64 overflow-hidden bg-gray-200 dark:bg-black">
        <img 
          [src]="producto.imagen_url || 'assets/img/no-image.png'" 
          [alt]="producto.nombre"
          class="w-full h-full object-cover grayscale-[0.3] group-hover:grayscale-0 group-hover:scale-110 transition-transform duration-700"
        >
        <div class="absolute inset-0 bg-gradient-to-t from-white dark:from-roar-card via-transparent to-transparent opacity-60"></div>
      </div>

      <div class="p-6 flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-2 font-mono">
          <span class="text-[9px] text-gray-400 dark:text-gray-500 tracking-tighter uppercase">SKU: {{ producto.sku }}</span>
          <span class="text-[10px] font-bold uppercase" [ngClass]="producto.cantidad > 0 ? 'text-emerald-500' : 'text-rose-600'">
            {{ producto.cantidad > 0 ? 'DISPONIBLE' : 'AGOTADO' }}
          </span>
        </div>
        
        <h3 class="font-bebas text-2xl text-gray-800 dark:text-white tracking-wider mb-4 group-hover:text-rose-600 transition-colors uppercase leading-tight">
          {{ producto.nombre }}
        </h3>

        <div class="mt-auto pt-4 border-t border-gray-100 dark:border-white/5 flex items-center justify-between">
          <div class="flex flex-col">
            <span class="text-[8px] uppercase font-bold text-gray-400">Precio Sugerido</span>
            <span class="text-2xl font-vt323 text-emerald-600 dark:text-emerald-400">
              ${{ producto.precio | number:'1.0-0' }}
            </span>
          </div>
          
          <button class="bg-gray-900 dark:bg-white text-white dark:text-black text-[10px] font-black px-5 py-2.5 rounded-xl uppercase tracking-tighter hover:bg-rose-600 hover:text-white transition-all transform active:scale-95 border border-transparent dark:border-white/10">
            Especificaciones
          </button>
        </div>
      </div>

      <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-rose-600/20 to-transparent scale-x-0 group-hover:scale-x-100 transition-transform duration-700"></div>
    </div>
  </div>

  <div *ngIf="listProductos.length === 0 && !loading" class="text-center py-32">
    <div class="inline-block p-8 border border-dashed border-gray-300 dark:border-white/10 rounded-3xl">
      <p class="text-gray-400 dark:text-gray-600 font-mono text-[10px] uppercase tracking-[0.8em] animate-pulse">
        ERROR_404: SIN_PRODUCTOS_EN_MATRIZ
      </p>
    </div>
  </div>

</div>
