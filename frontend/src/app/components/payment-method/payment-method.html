<div class="min-h-screen w-full flex items-center justify-center p-4 sm:p-10 bg-white dark:bg-[#0D1118] relative z-10 transition-colors duration-500">
    
    <div class="w-full max-w-2xl bg-white dark:bg-[#0D1118] border border-gray-200 dark:border-white/5 rounded-[2.5rem] p-8 md:p-12 shadow-2xl dark:shadow-[0_0_50px_rgba(0,0,0,0.5)] backdrop-blur-xl relative overflow-hidden transition-colors duration-500">
        
        <div class="absolute top-0 right-0 p-6 opacity-20 dark:opacity-10 pointer-events-none">
            <i class="fas fa-shield-alt text-6xl text-rose-600"></i>
        </div>

        <header class="mb-12 relative">
            <nav class="text-[10px] text-rose-600 font-bold uppercase tracking-[0.5em] mb-4 flex items-center gap-4">
                PROTOCOLO_PAGO <div class="h-px flex-1 bg-rose-600/20"></div>
            </nav>
            <h2 class="font-bebas text-5xl tracking-tighter text-gray-900 dark:text-white uppercase leading-none">
                SELECCIONAR_<span class="text-rose-600">MÉTODO</span>
            </h2>
            <p class="text-[10px] font-mono text-gray-400 dark:text-gray-500 mt-2 uppercase tracking-widest">
                Encriptación de Grado Militar AES-256 Activa
            </p>
        </header>

        <div class="space-y-4">
            <label *ngFor="let m of metodos" class="group cursor-pointer block relative">
                <input type="radio" 
                       name="payment" 
                       [value]="m.id" 
                       [(ngModel)]="metodoSeleccionado" 
                       class="peer hidden">
                
                <div class="flex items-center justify-between p-6 rounded-2xl border border-gray-100 dark:border-white/5 bg-gray-50/50 dark:bg-white/[0.02] transition-all duration-500 peer-checked:border-rose-600/50 peer-checked:bg-rose-600/[0.05] hover:border-gray-300 dark:hover:border-white/20">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-xl bg-white dark:bg-black/20 flex items-center justify-center border border-gray-200 dark:border-white/10 group-hover:scale-110 transition-transform">
                            <i [class]="m.icon" class="text-xl text-gray-400 group-hover:text-rose-500 transition-colors"></i>
                        </div>
                        <div>
                            <span class="block font-bebas text-xl tracking-wider text-gray-800 dark:text-gray-200 uppercase">{{ m.nombre }}</span>
                            <span class="block text-[9px] font-mono text-gray-400 uppercase tracking-tighter">{{ m.sub }}</span>
                        </div>
                    </div>
                    
                    <div class="w-6 h-6 rounded-full border-2 border-gray-200 dark:border-white/10 flex items-center justify-center peer-checked:border-rose-600 transition-colors">
                        <div class="w-3 h-3 rounded-full bg-rose-600 scale-0 peer-checked:scale-100 transition-transform"></div>
                    </div>
                </div>
            </label>
        </div>

        <div class="mt-12 space-y-4">
            <button (click)="continuar()"
                    [disabled]="!metodoSeleccionado"
                    [ngClass]="{'opacity-50 grayscale cursor-not-allowed': !metodoSeleccionado}"
                    class="sparkle-button group relative w-full py-5 text-white font-bebas text-2xl tracking-[0.3em] rounded-xl shadow-lg shadow-rose-600/10 hover:shadow-rose-600/30 transition-all active:scale-[0.98] overflow-hidden bg-rose-600">
                
                <span class="relative z-10 flex items-center justify-center gap-3">
                    CONFIRMAR_PROTOCOLO
                    <i class="fas fa-arrow-right text-sm opacity-50 group-hover:translate-x-1 transition-transform"></i>
                </span>
                
                <div *ngIf="metodoSeleccionado" 
                     class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-shimmer-scan">
                </div>
            </button>

            <button routerLink="/app/cart" 
                    class="w-full py-3 text-[10px] font-bold text-gray-400 hover:text-rose-500 transition-colors uppercase tracking-[0.4em] flex items-center justify-center gap-2">
                <i class="fas fa-chevron-left text-[8px]"></i> Modificar_Suministros
            </button>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-100 dark:border-white/5 flex justify-between items-center opacity-40">
            <span class="text-[8px] font-mono uppercase tracking-widest text-gray-500">
                ID_TRANSACCIÓN: RM-{{ 2026 | date:'yyyy' }}-77X
            </span>
            <div class="flex gap-2">
                <div class="w-1 h-1 rounded-full bg-emerald-500 animate-pulse"></div>
                <div class="w-1 h-1 rounded-full bg-emerald-500 animate-pulse delay-75"></div>
            </div>
        </div>
    </div>
</div>
