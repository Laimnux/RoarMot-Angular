<header
    class="w-full transition-colors duration-500 bg-white dark:bg-[#0D1118]/95 backdrop-blur-md sticky top-0 z-50 shadow-sm dark:shadow-none">
    <nav class="w-full flex items-center justify-between px-4 sm:px-6 py-3">

        <div class="flex items-center gap-3 cursor-pointer group" routerLink="/dashboard">
            <div class="relative">
                <img src="assets/image/shared/LogoBlanco.png" alt="Logo"
                    class="h-10 w-auto transition-transform group-hover:rotate-12 dark:invert-0 invert">
                <div
                    class="absolute inset-0 bg-red-600/10 blur-xl rounded-full -z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                </div>
            </div>
            <h1
                class="text-3xl font-bebas text-gray-900 dark:text-white tracking-tighter shader-text uppercase transition-colors">
                ROARMOT
            </h1>
        </div>

        <div class="hidden md:flex items-center p-1 gap-1 transition-all
                    bg-white dark:bg-white/5 
                    border border-gray-300 dark:border-white/10 rounded-2xl">

            <a routerLink="/dashboard"
                routerLinkActive="bg-gray-900 text-white dark:bg-white/10 dark:text-red-500 shadow-md"
                class="nav-item flex items-center gap-2 px-3 py-2 rounded-xl text-black dark:text-gray-400 font-bold">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h2a2 2 0 002-2zM9 19h6m-6 0l6-6m0 0v6a2 2 0 002 2h2a2 2 0 002-2v-6a2 2 0 00-2-2h-2a2 2 0 00-2 2zm0 0V5a2 2 0 00-2-2h-2a2 2 0 00-2 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
                </svg>
                <span>Panel de control</span>
            </a>

            <button
                class="nav-item text-black dark:text-gray-400 hover:text-red-600 dark:hover:text-white px-3 py-2 font-bold">
                <span>Documentos</span>
            </button>

            <button
                class="nav-item relative text-black dark:text-gray-400 hover:text-red-600 dark:hover:text-white px-3 py-2 font-bold">
                <span>Alertas</span>
                <span class="absolute top-2 right-1 w-2 h-2 bg-red-600 rounded-full animate-ping"></span>
            </button>

            <div class="w-px h-6 bg-gray-900 dark:bg-white/10 mx-1"></div>

            <a routerLink="/sos"
                class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white dark:bg-red-600/10 dark:text-red-500 rounded-xl transition-all font-black italic group shadow-md">
                SOS
            </a>
        </div>

        <div class="flex items-center gap-4">
            <button
                class="hidden lg:block sparkle-button bg-yellow-400 text-black px-5 py-2 rounded-xl font-black text-sm hover:scale-105 transition-transform uppercase tracking-wider shadow-lg shadow-yellow-500/20">
                Store Accesories
            </button>

            <div class="relative group">
                <button class="flex items-center gap-2 p-1 pr-3 transition-colors
                               bg-white dark:bg-white/5 
                               border border-gray-300 dark:border-white/10 rounded-2xl">
                    <div class="w-10 h-10 rounded-xl overflow-hidden">
                        <img [src]="usuario.urlImagenPerfil || 'assets/uploads/avatar2.png'"
                            class="w-full h-full object-cover">
                    </div>
                    <svg class="w-4 h-4 text-black dark:text-gray-400 group-hover:rotate-180 transition-transform"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M19 9l-7 7-7-7" />
                    </svg>
                </button>

                <div class="absolute right-0 mt-3 w-72 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all translate-y-2 group-hover:translate-y-0 z-50 overflow-hidden
                            bg-white dark:bg-[#0D1118] 
                            border border-gray-200 dark:border-gray-700">

                    <div class="p-5 border-b border-gray-50 dark:border-white/5" *ngIf="usuario">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-14 h-14 rounded-2xl">
                                <img [src]="usuario?.urlImagenPerfil || 'assets/uploads/avatar2.png'"
                                    class="w-full h-full object-cover rounded-[14px]">
                            </div>

                            <div>
                                <h3 class="text-gray-700 dark:text-gray-300 font-black uppercase text-sm">
                                    {{ usuario?.nombre }}
                                </h3>

                                <span class="text-[10px] px-2 py-0.5 rounded-full font-black tracking-tighter"
                                    [ngClass]="usuario?.rol_id === 1 ? 'bg-violet-900 text-white' : 'bg-emerald-800 text-gray-300'">
                                    {{ usuario?.rol_id === 1 ? 'Proveedor Autorizado' : 'Usuario Habitual' }}
                                </span>
                            </div>
                        </div>

                        <p class="text-xs text-gray-700/70 dark:text-gray-400 font-bold truncate">
                            {{ formatearEmail(usuario?.email) }}
                        </p>
                    </div>

                    <div class="h-px bg-gray-400 dark:bg-gray-700 my-1"></div>

                    <div class="p-2 grid grid-cols-1 gap-1">
                        <button
                            class="dropdown-link flex items-center gap-2 w-full p-2 text-gray-200 dark:text-gray-700 font-bold hover:bg-gray-100 dark:hover:bg-white/5 rounded-xl transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            Mi Perfil
                        </button>

                        <div class="h-px bg-gray-400 dark:bg-gray-700 my-1"></div>

                        <div class="px-4 py-3 flex items-center justify-between">
                            <span class="text-xs text-gray-700 dark:text-gray-300 font-black uppercase">Modo
                                Nocturno</span>
                            <button (click)="toggleDarkMode()"
                                class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none border border-gray-400 dark:border-transparent"
                                [class.bg-red-600]="isDarkMode" [class.bg-gray-200]="!isDarkMode">
                                <span [class.translate-x-6]="isDarkMode" [class.translate-x-1]="!isDarkMode"
                                    class="inline-block h-4 w-4 transform rounded-full bg-white dark:bg-white transition-transform shadow-md">
                                </span>
                            </button>
                        </div>

                        <button (click)="logout()"
                            class="dropdown-link flex items-center gap-2 w-full p-2 text-red-500 font-black hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Cerrar Sesión
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="h-[1px] w-full animate-pulse transition-all duration-700
                bg-gradient-to-r from-transparent via-red-600 to-transparent 
                dark:via-red-600
                shadow-[0_0_15px_rgba(220,38,38,0.5)] dark:shadow-[0_0_15px_rgba(255,255,255,0.1)]">
    </div>
</header>
