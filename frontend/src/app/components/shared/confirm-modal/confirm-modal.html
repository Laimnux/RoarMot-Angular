<div *ngIf="visible" 
     class="fixed inset-0 z-[100] flex items-center justify-center p-4 backdrop-blur-md bg-black/60 transition-all duration-300">
  
  <div class="bg-[#090C10] border border-rose-600/30 rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl shadow-rose-600/10 animate-in fade-in zoom-in duration-300">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-rose-600/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-600/30">
        <i class="fas fa-percentage text-rose-600 text-2xl animate-pulse"></i>
      </div>
      <h3 class="text-white font-bebas text-3xl tracking-widest uppercase">{{ titulo }}</h3>
      <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest mt-1">
        {{ nombreProducto }}
      </p>
    </div>

    <div class="space-y-4 mb-8">
      <label class="block text-[10px] text-gray-500 font-black uppercase tracking-widest ml-2">
        Porcentaje de Descuento
      </label>
      <div class="relative group">
        <input type="number" 
               [(ngModel)]="porcentaje" 
               class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-white font-bebas text-4xl text-center focus:border-rose-600 focus:bg-rose-600/5 focus:outline-none transition-all duration-300"
               placeholder="20" 
               min="1" 
               max="99">
        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-rose-600 font-bebas text-2xl">%</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <button (click)="cancelar()" 
              class="py-4 rounded-xl border border-white/10 text-white font-bebas tracking-widest hover:bg-white/5 transition-all uppercase text-sm">
        VOLVER
      </button>
      <button (click)="confirmar()" 
              class="py-4 rounded-xl bg-rose-600 text-white font-bebas tracking-widest hover:bg-rose-700 hover:shadow-[0_0_20px_rgba(225,29,72,0.4)] transition-all uppercase text-sm">
        ACTIVAR OFERTA
      </button>
    </div>

  </div>
</div>
