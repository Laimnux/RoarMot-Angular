<div class="text-center mb-10">
  <!-- Convertimos el div en un botón navegable -->
  <div (click)="irAHome()"
    class="flex items-center justify-center space-x-2 mb-4 cursor-pointer hover:opacity-80 transition-opacity active:scale-95"
    role="button" tabindex="0" (keydown.enter)="irAHome()" (keydown.space)="irAHome()">
    <img src="assets/image/shared/LogoBlanco.png" alt="Logo" class="h-12 w-auto brightness-200">
    <h1 class="text-5xl font-bebas text-white tracking-tighter shader-text">ROARMOT</h1>
  </div>
  <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold">Registro Paso 1: Perfil</p>
</div>

<div class="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/10 shadow-2xl">
  <h1 class="font-bebas text-4xl text-white text-center mb-6 tracking-wide">REGÍSTRATE Y EMPIEZA</h1>

  <div class="space-y-6">
    <div class="relative mb-8">
      <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-500 mb-3 text-center">
        ¿Eres Motero o Vendedor?
      </label>
      <div class="flex border border-gray-700 rounded-xl overflow-hidden bg-black/40 p-1">
        <button type="button" (click)="cambiarRol('comprador')" [attr.data-selected]="rol === 'comprador'"
          class="flex-1 py-3 font-bebas text-xl tracking-widest rounded-lg transition-all duration-500">
          MOTERO
        </button>
        <button type="button" (click)="cambiarRol('vendedor')" [attr.data-selected]="rol === 'vendedor'"
          class="flex-1 py-3 font-bebas text-xl tracking-widest rounded-lg transition-all duration-500">
          VENDEDOR
        </button>
      </div>
    </div>

    <div class="relative group">
      <input type="email" id="reg-email" [(ngModel)]="email" required
        class="peer w-full bg-black/40 border border-gray-800 rounded-xl pt-6 pb-2 px-4 text-white text-sm focus:outline-none focus:border-red-600 transition-all duration-300 placeholder-transparent mb-8"
        placeholder="Correo">
      <label for="reg-email"
        class="absolute left-4 top-2 text-[10px] uppercase font-bold tracking-widest text-gray-500 transition-all 
               peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-focus:top-2 peer-focus:text-[10px] peer-focus:text-red-500">
        Correo Electrónico
      </label>
      <div *ngIf="emailInvalido()" class="absolute -bottom-5 left-2 flex items-center space-x-1 animate-pulse mb-8">
        <span class="text-[9px] text-red-500 font-bold uppercase tracking-tighter">
          Por favor, usa un formato válido de @gmail.com
        </span>
      </div>
    </div>

    <button (click)="continuar()" [disabled]="!esFormularioValido()" [class.opacity-50]="!esFormularioValido()"
      [class.cursor-not-allowed]="!esFormularioValido()"
      class="w-full py-4 bg-red-600 text-white font-bebas text-2xl rounded-xl hover:bg-red-700 transition-all shadow-lg mt-6 active:scale-95">
      CONTINUAR
    </button>
  </div>
</div>

<div class="mt-12 text-center">
  <p
    class="italic font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-yellow-500 text-lg uppercase tracking-widest">
    "MOTERO AYUDA MOTERO"
  </p>
</div>
