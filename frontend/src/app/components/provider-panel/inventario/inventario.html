<div class="space-y-8 animate-fade-in">
  
  <div class="flex flex-col md:flex-row justify-between items-end gap-6 border-b border-gray-200 dark:border-white/5 pb-8">
    <div>
      <h2 class="text-4xl font-bebas tracking-tighter text-gray-900 dark:text-white leading-none">
        CONTROL <span class="text-rose-600">INVENTARIO</span>
      </h2>
      <p class="text-[10px] uppercase font-black tracking-[0.3em] text-gray-500 mt-2">Data_Source: Live_Stock_V2</p>
    </div>

    <div class="relative w-full md:w-96 group">
      <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
        <i class="fas fa-search text-gray-500 text-xs group-focus-within:text-rose-600 transition-colors"></i>
      </div>
      <input 
        type="text" 
        (input)="onSearch($event)"
        placeholder="FILTRAR POR NOMBRE O SKU..."
        class="w-full bg-white dark:bg-[#090C10] border border-gray-200 dark:border-white/10 rounded-2xl py-3 pl-12 pr-4 text-[11px] font-black uppercase tracking-widest focus:outline-none focus:border-rose-600/50 focus:ring-4 focus:ring-rose-600/5 transition-all placeholder:text-gray-600">
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    
    <div *ngFor="let prod of productosFiltrados" 
         class="card-roarmot group relative bg-white dark:bg-[#090C10] rounded-[2.5rem] p-6 border border-gray-100 dark:border-white/5 transition-all duration-500">
      
      <div class="relative h-56 w-full mb-6 overflow-hidden rounded-[2rem] bg-gray-100 dark:bg-[#0D1118]">
        <img [src]="prod.imagen || 'assets/img/no-product.png'" 
             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 grayscale-[30%] group-hover:grayscale-0">
        
        <div class="absolute top-4 right-4">
          <span class="bg-black/80 text-white text-[9px] px-3 py-1.5 rounded-xl backdrop-blur-xl border border-white/10 font-black tracking-widest">
            SKU_{{prod.sku}}
          </span>
        </div>
      </div>

      <div class="space-y-4">
        <div class="flex justify-between items-start">
          <h3 class="text-2xl font-bebas tracking-wide text-gray-900 dark:text-white uppercase">{{prod.nombre}}</h3>
          <button (click)="borrarProducto(prod.id, prod.nombre)" class="text-gray-400 hover:text-rose-600 transition-colors">
            <i class="fas fa-trash-alt text-xs"></i>
          </button>
        </div>

        <div class="flex justify-between items-end border-t border-gray-100 dark:border-white/5 pt-4">
          <div>
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Val_Market</p>
            <span class="text-3xl font-bebas text-rose-600 tracking-wider">${{prod.precio | number}}</span>
          </div>
          
          <div class="text-right">
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Status_Stock</p>
            <span [class]="prod.cantidad < prod.stock_minimo ? 'text-rose-500 animate-pulse' : 'text-emerald-500'" 
                  class="text-xl font-bebas tracking-widest">
              {{prod.cantidad}} <span class="text-[10px]">UNITS</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
